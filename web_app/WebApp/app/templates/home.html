{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Home</h2>

  {% if username %}
    <p>You are logged in as <b>{{ username }}</b>.</p>

    <p>
      <a href="/2fa/setup">2FA Setup</a>
    </p>

    <form method="post" action="/logout">
      <button type="submit">Logout</button>
    </form>
  {% else %}
    <p>You are not logged in.</p>
    <p><a href="/login">Go to login</a></p>
    <p><a href="/login?force_2fa=1">Demo: force 2FA challenge</a></p>
  {% endif %}
</div>
{% endblock %}
