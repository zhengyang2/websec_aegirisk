{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Register</h2>
  <form method="post" action="/register">
    <div class="row">
      <label>Username</label>
      <input name="username" />
    </div>
    <div class="row">
      <label>Password</label>
      <input name="password" type="password" />
    </div>
    <button type="submit">Create account</button>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
  </form>
</div>
{% endblock %}
